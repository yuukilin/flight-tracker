name: Flight Query

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'history / best / chart / debug'
        type: choice
        options: [history, best, chart, debug]
        required: true
      route_id:
        description: 'Route ID'
        type: string
        required: true
      chat_id:
        description: 'Telegram chat id to send result'
        type: string
        required: true
      days:
        description: 'Days back (for history / chart)'
        type: string
        default: '30'

permissions:
  actions: read
  contents: read

jobs:
  query:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Dependency consistency check
        run: pip check

      - name: Dependency smoke test
        run: python -c "import scripts.query"

      - name: Restore prices DB cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/prices.db
            data/scrape_state.json
            data/last_fx.json
          key: prices-db-${{ github.run_id }}
          restore-keys: |
            prices-db-

      - name: Resolve latest scrape artifact
        id: latest-scrape
        env:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: python scripts/download_latest_artifact.py --resolve-only --github-output

      - name: Restore latest scrape artifact
        if: steps.latest-scrape.outcome == 'success'
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ${{ steps.latest-scrape.outputs.artifact_name }}
          run-id: ${{ steps.latest-scrape.outputs.run_id }}
          github-token: ${{ github.token }}
          path: data

      - name: Show restored query data
        run: python -c "from pathlib import Path; p=Path('data/prices.db'); s=Path('data/scrape_state.json'); print(f'prices.db exists={p.exists()} size={p.stat().st_size if p.exists() else 0}'); print(f'scrape_state exists={s.exists()} size={s.stat().st_size if s.exists() else 0}')"

      - name: Run query
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ACTION: ${{ inputs.action }}
          ROUTE_ID: ${{ inputs.route_id }}
          CHAT_ID: ${{ inputs.chat_id }}
          DAYS: ${{ inputs.days }}
        run: |
          python scripts/query.py \
            --action "$ACTION" \
            --route-id "$ROUTE_ID" \
            --chat-id "$CHAT_ID" \
            --days "$DAYS"

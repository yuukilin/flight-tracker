name: Flight Query

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'history / best / chart / debug'
        type: choice
        options: [history, best, chart, debug]
        required: true
      route_id:
        description: 'Route ID'
        type: string
        required: true
      chat_id:
        description: 'Telegram chat id to send result'
        type: string
        required: true
      days:
        description: 'Days back (for history / chart)'
        type: string
        default: '30'

permissions:
  actions: read
  contents: read

jobs:
  query:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Dependency consistency check
        run: pip check

      - name: Dependency smoke test
        run: python -c "import scripts.query"

      - name: Restore prices DB cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/prices.db
            data/scrape_state.json
            data/last_fx.json
          key: prices-db-${{ github.run_id }}
          restore-keys: |
            prices-db-

      - name: Restore latest scrape artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/download_latest_artifact.py || {
            echo "Artifact download failed; continuing with cache if available."
          }

      - name: Run query
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ACTION: ${{ inputs.action }}
          ROUTE_ID: ${{ inputs.route_id }}
          CHAT_ID: ${{ inputs.chat_id }}
          DAYS: ${{ inputs.days }}
        run: |
          python scripts/query.py \
            --action "$ACTION" \
            --route-id "$ROUTE_ID" \
            --chat-id "$CHAT_ID" \
            --days "$DAYS"

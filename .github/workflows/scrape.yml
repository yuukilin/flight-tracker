name: Flight Price Scrape

on:
  schedule:
    # 台灣時間 09:00 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:    # 允許手動觸發（Cloudflare Worker 的 /scan 也走這條）

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      # ── 從 cache 還原上次的 SQLite（如果有的話）──
      - name: Restore prices DB cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/prices.db
            data/scrape_state.json
            data/notified_state.json
            data/status.json
            data/last_fx.json
          key: prices-db-${{ github.run_id }}
          restore-keys: |
            prices-db-

      - name: Run scrape
        run: python scripts/scrape.py

      - name: Run analyze
        run: python scripts/analyze.py

      - name: Send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_HEARTBEAT: '1'
          STATUS_WEBHOOK_URL: https://flight-bot.sonyzxcgo7411.workers.dev/internal/status
        run: python scripts/notify.py

      # ── 把新版 DB 存回 cache（永遠用 run_id 當 key，每次新增、舊的 LRU 自動清）──
      - name: Save prices DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/prices.db
            data/scrape_state.json
            data/notified_state.json
            data/status.json
            data/last_fx.json
          key: prices-db-${{ github.run_id }}

      # ── 也上傳成 Artifact 作為備援，可以從 Actions 頁面下載 ──
      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prices-db-${{ github.run_id }}
          path: |
            data/prices.db
            data/analysis.json
            data/scrape_state.json
            data/notified_state.json
            data/status.json
            data/last_fx.json
          retention-days: 30

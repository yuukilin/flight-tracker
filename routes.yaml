# 機票追蹤路線設定
# 這個檔案可以由 Telegram bot 的 /add /remove 指令自動修改
# 你也可以手動編輯
# 注意：Telegram bot 也會讀 routes.json（同步檔案），優先以 routes.json 為主

routes:
  # 測試用迷你路線（驗證 pipeline 用，之後用 /remove 1 可刪除）
  - id: 1
    name: "測試：台北東京 5 天"
    active: true
    origin: TPE
    destinations: [NRT]
    cabin_classes: [economy]
    depart_date_range:
      start: "2026-08-01"
      end: "2026-08-07"
    trip_duration_days: 5
    must_contain_full_weekends: 0
    depart_weekdays: null
    max_price_twd: 80000
    depart_time_window: null
    max_stops: 2
    notify_threshold: "any"   # 測試階段用 any，確保一定推訊息
    created_at: "2026-05-26"

next_id: 2
